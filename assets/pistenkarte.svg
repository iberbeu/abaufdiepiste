<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background: snowy mountain -->
  <rect width="200" height="200" fill="#eaf4fb" rx="8"/>

  <!-- Mountain shape -->
  <polygon points="100,20 180,160 20,160" fill="#c8dce8"/>
  <polygon points="100,20 130,80 70,80" fill="#ffffff"/>

  <!-- Trees (simple triangles) -->
  <polygon points="30,155 38,135 46,155" fill="#2d6a2d"/>
  <polygon points="155,155 163,135 171,155" fill="#2d6a2d"/>
  <polygon points="50,158 57,142 64,158" fill="#2d6a2d"/>
  <polygon points="140,158 147,142 154,158" fill="#2d6a2d"/>

  <!-- Ski lift line -->
  <line x1="100" y1="22" x2="100" y2="158" stroke="#888" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Lift towers -->
  <rect x="97" y="60" width="6" height="10" fill="#888"/>
  <rect x="97" y="110" width="6" height="10" fill="#888"/>

  <!-- Blue slope (easy) -->
  <path d="M100,30 Q60,80 45,158" fill="none" stroke="#1565c0" stroke-width="4" stroke-linecap="round"/>

  <!-- Red slope (intermediate) -->
  <path d="M100,30 Q120,90 130,158" fill="none" stroke="#c62828" stroke-width="4" stroke-linecap="round"/>

  <!-- Black slope (expert) -->
  <path d="M100,30 Q145,70 160,158" fill="none" stroke="#212121" stroke-width="4" stroke-linecap="round"/>

  <!-- Difficulty dots legend -->
  <circle cx="20" cy="185" r="6" fill="#1565c0"/>
  <circle cx="36" cy="185" r="6" fill="#c62828"/>
  <rect x="48" y="179" width="12" height="12" rx="1" fill="#212121"/>

  <!-- Snow caps -->
  <ellipse cx="100" cy="20" rx="12" ry="6" fill="#ffffff" opacity="0.9"/>
</svg>
