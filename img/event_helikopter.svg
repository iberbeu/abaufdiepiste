<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff9c4"/>
      <stop offset="100%" style="stop-color:#ffe082"/>
    </linearGradient>
  </defs>
  <rect width="80" height="80" rx="12" fill="url(#bg)"/>
  <!-- Main rotor -->
  <line x1="10" y1="18" x2="70" y2="18" stroke="#5d4037" stroke-width="4" stroke-linecap="round"/>
  <line x1="40" y1="8" x2="40" y2="28" stroke="#5d4037" stroke-width="4" stroke-linecap="round"/>
  <!-- Rotor hub -->
  <circle cx="40" cy="18" r="5" fill="#5d4037"/>
  <!-- Mast -->
  <line x1="40" y1="23" x2="40" y2="30" stroke="#5d4037" stroke-width="3" stroke-linecap="round"/>
  <!-- Body -->
  <ellipse cx="38" cy="42" rx="22" ry="12" fill="#e05252"/>
  <!-- Cockpit bubble -->
  <ellipse cx="52" cy="40" rx="10" ry="9" fill="#cfe4ff" stroke="#e05252" stroke-width="1.5"/>
  <!-- Tail -->
  <path d="M16 42 L6 50 L10 52 L18 48" fill="#c62828"/>
  <!-- Tail rotor -->
  <line x1="6" y1="47" x2="6" y2="55" stroke="#5d4037" stroke-width="3" stroke-linecap="round"/>
  <line x1="2" y1="51" x2="10" y2="51" stroke="#5d4037" stroke-width="3" stroke-linecap="round"/>
  <!-- Skids -->
  <line x1="26" y1="52" x2="52" y2="52" stroke="#5d4037" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="30" y1="48" x2="30" y2="52" stroke="#5d4037" stroke-width="2" stroke-linecap="round"/>
  <line x1="46" y1="48" x2="46" y2="52" stroke="#5d4037" stroke-width="2" stroke-linecap="round"/>
  <!-- Label -->
  <text x="40" y="70" text-anchor="middle" font-size="8.5" font-family="sans-serif" font-weight="700" fill="#5d4037" letter-spacing="0.3">HELIKOPTER</text>
</svg>
