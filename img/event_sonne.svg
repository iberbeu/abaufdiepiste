<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff9c4"/>
      <stop offset="100%" style="stop-color:#ffe082"/>
    </linearGradient>
  </defs>
  <rect width="80" height="80" rx="12" fill="url(#bg)"/>
  <!-- Sun rays -->
  <g stroke="#f57f17" stroke-width="3" stroke-linecap="round">
    <line x1="40" y1="8"  x2="40" y2="16"/>
    <line x1="40" y1="58" x2="40" y2="66"/>
    <line x1="8"  y1="37" x2="16" y2="37"/>
    <line x1="64" y1="37" x2="72" y2="37"/>
    <line x1="16" y1="13" x2="22" y2="19"/>
    <line x1="58" y1="55" x2="64" y2="61"/>
    <line x1="64" y1="13" x2="58" y2="19"/>
    <line x1="16" y1="61" x2="22" y2="55"/>
  </g>
  <!-- Sun body -->
  <circle cx="40" cy="37" r="18" fill="#ffd600"/>
  <circle cx="40" cy="37" r="14" fill="#ffec40"/>
  <!-- Face smile -->
  <circle cx="34" cy="33" r="2.5" fill="#f57f17"/>
  <circle cx="46" cy="33" r="2.5" fill="#f57f17"/>
  <path d="M32 42 Q40 49 48 42" stroke="#f57f17" stroke-width="2.5" fill="none" stroke-linecap="round"/>
