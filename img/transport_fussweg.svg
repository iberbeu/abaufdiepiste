<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <rect width="80" height="80" rx="12" fill="url(#bg)"/>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f0fe"/>
      <stop offset="100%" style="stop-color:#c5d8f8"/>
    </linearGradient>
  </defs>
  <!-- Boot/Shoe -->
  <g fill="#1a3a5c">
    <!-- leg -->
    <rect x="28" y="16" width="10" height="26" rx="4"/>
    <!-- boot -->
    <path d="M24 40 h20 v10 q0 6 -6 6 H20 v-6 h4 z" />
    <!-- sole line -->
    <rect x="20" y="54" width="24" height="3" rx="1.5" fill="#0d2540"/>
    <!-- laces -->
    <line x1="30" y1="42" x2="38" y2="44" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="30" y1="46" x2="38" y2="48" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
    <!-- walking lines -->
    <path d="M44 42 q6 0 6 -6" stroke="#1a3a5c" stroke-width="2" fill="none" stroke-linecap="round" stroke-dasharray="2 2"/>
    <path d="M46 48 q6 0 6 -5" stroke="#1a3a5c" stroke-width="2" fill="none" stroke-linecap="round" stroke-dasharray="2 2"/>
  </g>
  <!-- Label -->
  <text x="40" y="72" text-anchor="middle" font-size="8" font-family="sans-serif" font-weight="700" fill="#1a3a5c" letter-spacing="0.5">FUSSWEG</text>
</svg>
