<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ab auf die Piste</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app">
      <header class="header">
        <button class="hamburger-menu" aria-label="Menue oeffnen">
          <span class="hamburger-icon">
            <span></span>
            <span></span>
            <span></span>
          </span>
          <span class="menu-label">Menu</span>
        </button>
      </header>

      <section class="title-section">
        <h1 class="main-title">Ab auf die Piste</h1>
      </section>

      <section class="card-section">
        <div class="download-card">
          <div class="card-image-wrapper">
            <img
              src="https://placehold.co/120x120?text=Pistenkarte"
              alt="Pistenkarte"
              class="card-image"
            />
          </div>
          <p class="card-label">Karten runterladen</p>
        </div>

        <div class="download-card">
          <div class="card-image-wrapper">
            <img
              src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/78/Google_Play_Store_badge_EN.svg/320px-Google_Play_Store_badge_EN.svg.png"
              alt="Google Play Store"
              class="card-image"
            />
          </div>
          <p class="card-label">App runterladen</p>
        </div>
      </section>
    </div>

    <script src="app.js"></script>
  </body>
</html>
